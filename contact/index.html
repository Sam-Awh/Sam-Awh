<!DOCTYPE html>
<html lang="en" class="lenis">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Saraj Design</title>
    <meta name="description" content="Get in touch :)">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Contact - Saraj Design">
    <meta property="og:description" content="Get in touch :)">
    <meta property="og:url" content="https://sarajdesign.vercel.app/contact">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact - Saraj Design">
    <meta name="twitter:description" content="Get in touch :)">

    <!-- Favicon -->
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../assets/touch-icon.png">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <a href="../index.html" class="gradient-text">Saraj Design.</a>
            </div>
            <div class="navbar-menu">
                <ul class="navbar-menu-items">
                    <li class="navbar-menu-item"><a href="../index.html">Home</a></li>
                    <li class="navbar-menu-item"><a href="index.html">Contact</a></li>
                </ul>
                <span class="navbar-menu-toggle">Menu</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="page-wrapper">
        <!-- Contact Section -->
        <section class="contact-section">
            <div class="contact-header aos">
                <h1 class="contact-title">
                    Let's <strong>work</strong> together.
                </h1>
            </div>

            <form class="contact-form aos" action="" method="POST">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" class="form-textarea"
                        placeholder="Tell me about your project..." required></textarea>
                </div>

                <button type="submit" class="form-submit">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-columns">
                    <div class="footer-column">
                        <h3 class="footer-column-title">Sitemap</h3>
                        <div class="footer-column-links">
                            <a href="../index.html">Coming Soon</a>
                        </div>
                    </div>
                    <div class="footer-column">
                        <h3 class="footer-column-title">Studio</h3>
                        <div class="footer-column-links">
                            <a href="index.html">Contact</a>
                        </div>
                    </div>
                    <div class="footer-column">
                        <h3 class="footer-column-title">Social</h3>
                        <div class="footer-column-links">
                            <a href="https://x.com/iceonmeneck" target="_blank" rel="noopener">X</a>
                            <a href="https://instagram.com/iceonmeneck" target="_blank" rel="noopener">Instagram</a>
                            <a href="https://www.linkedin.com/in/sarajraja/" target="_blank" rel="noopener">LinkedIn</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <h2 class="footer-logo">
                    <a href="../index.html">Saraj Design.</a>
                </h2>
                <p class="footer-copyright">Copyright 2026. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Lenis Smooth Scroll (from CDN) -->
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

    <!-- Main Script -->
    <script src="../js/main.js"></script>
</body>

</html>
